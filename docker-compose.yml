services:
  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    environment:
      - REPLICA1_URL=http://replica1:4001
      - REPLICA2_URL=http://replica2:4002
      - REPLICA3_URL=http://replica3:4003
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - raft-net
    volumes:
      - ./gateway:/app
      - ./frontend:/frontend
      - /app/node_modules

  replica1:
    build: ./replica1
    ports:
      - "4001:4001"
    environment:
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=http://replica2:4002,http://replica3:4003
    networks:
      - raft-net
    volumes:
      - ./replica1:/app
      - /app/node_modules

  replica2:
    build: ./replica2
    ports:
      - "4002:4002"
    environment:
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=http://replica1:4001,http://replica3:4003
    networks:
      - raft-net
    volumes:
      - ./replica2:/app
      - /app/node_modules

  replica3:
    build: ./replica3
    ports:
      - "4003:4003"
    environment:
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=http://replica1:4001,http://replica2:4002
    networks:
      - raft-net
    volumes:
      - ./replica3:/app
      - /app/node_modules

networks:
  raft-net:
    driver: bridge